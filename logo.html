<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPay Hub Logo</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f6f9;
font-family:Arial, sans-serif;
}

/* Logo container */

.logo{
display:flex;
align-items:center;
gap:12px;
}

/* Icon */

.logo-icon{
width:60px;
height:60px;
border-radius:12px;
background:linear-gradient(135deg,#0066ff,#00d4ff);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Text */

.logo-text{
font-size:28px;
font-weight:bold;
color:#0a2540;
}

.logo-text span{
color:#0066ff;
}

</style>
</head>

<body>

<div class="logo">

<div class="logo-icon">
N
</div>

<div class="logo-text">
NexPay <span>Hub</span>
</div>

</div>

</body>
</html>
